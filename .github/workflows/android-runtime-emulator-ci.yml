name: Android Runtime Emulator CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      test_level:
        description: 'smoke runs connected tests; screenshots_only skips tests'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full
          - screenshots_only
      runtime_target:
        description: 'selector'
        required: true
        default: 'all'
        type: choice
        options:
          - all
      api_level:
        description: 'Android API level'
        required: true
        default: '34'
      retry_failed:
        description: 'Retry failed tests'
        required: true
        default: 'false'
        type: boolean

jobs:
  runtime-emulator:
    name: Emulator Runtime Verification
    runs-on: ubuntu-latest
    timeout-minutes: 55

    env:
      TEST_LEVEL: ${{ inputs.test_level || 'smoke' }}
      RUNTIME_TARGET: ${{ inputs.runtime_target || 'all' }}
      API_LEVEL: ${{ inputs.api_level || '34' }}
      RETRY_FAILED: ${{ inputs.retry_failed || 'false' }}
      APP_ID: com.easyui.guardianlauncher
      MAIN_ACTIVITY: com.easyui.guardianlauncher/.MainActivity

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Assemble debug and androidTest APKs
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Run emulator tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            adb devices
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            ./gradlew :app:connectedDebugAndroidTest

      - name: Capture logcat
        if: always()
        run: |
          mkdir -p ci-artifacts/logs
          adb logcat -d > ci-artifacts/logs/logcat.txt || true
          adb devices -l > ci-artifacts/logs/adb_devices.txt || true

      - name: Capture UI dump
        if: always()
        run: |
          mkdir -p ci-artifacts/ui
          adb shell uiautomator dump /sdcard/window_dump.xml || true
          adb pull /sdcard/window_dump.xml ci-artifacts/ui/window_dump.xml || true

      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-verification-artifacts
          path: |
            ci-artifacts/
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
            **/build/outputs/connected_android_test_additional_output/
            **/build/test-results/
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/androidTest/debug/*.apk
